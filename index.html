<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lytana — Linkage of Your Technical Appointment & Network Assistance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* CSS DASAR LYTANA */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1c2e;--navy2:#162336;--navy3:#1e3050;
  --blue:#2563eb;--blue2:#3b82f6;--sky:#38bdf8;
  --teal:#0d9488;--teal2:#14b8a6;--green:#10b981;
  --amber:#f59e0b;--rose:#f43f5e;--purple:#8b5cf6;--orange:#f97316;
  --slate:#94a3b8;--slate2:#cbd5e1;--white:#ffffff;
  --card:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.08);
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--navy);color:var(--white);line-height:1.6;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Sora',sans-serif;font-weight:700}
.container{max-width:1100px;margin:0 auto;padding:20px}
button{cursor:pointer;transition:all 0.3s ease;font-family:inherit}
.btn-primary{background:var(--blue);color:white;border:none;padding:10px 20px;border-radius:10px;font-weight:600}
.btn-primary:hover{background:var(--blue2);transform:translateY(-2px)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--white);padding:8px 16px;border-radius:8px}
.btn-outline:hover{background:var(--card)}

/* GAYA KHUSUS TOMBOL PENGUMUMAN */
.btn-announce {
  background: linear-gradient(135deg, var(--orange), var(--amber));
  color: white; border: none; padding: 12px 20px; border-radius: 12px;
  font-weight: 700; display: inline-flex; align-items: center; gap: 10px;
  box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); margin-bottom: 20px;
}
.btn-announce:hover { transform: scale(1.02); filter: brightness(1.1); }

/* (Gaya CSS lainnya tetap sama seperti file asli Anda) */
#app{min-height:100vh}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:25px;margin-bottom:20px;backdrop-filter:blur(10px)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
</style>
</head>
<body>

<div id="app">
  <div style="display:flex;justify-content:center;align-items:center;height:100vh;">
    <p>Memuat Lytana...</p>
  </div>
</div>

<script>
// GANTI DENGAN URL SCRIPT ANDA
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx_U679Z_4p65m_EwL4k09a0tW8U1H7U_4XU8X/exec"; 

// STATE APLIKASI
let user = null;
let data = null;

// FUNGSI UTAMA API
async function req(action, body = {}) {
  const token = localStorage.getItem('lytana_token');
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action, token, ...body })
    });
    return await res.json();
  } catch (e) {
    return { success: false, message: "Koneksi gagal: " + e.message };
  }
}

// ============================================================
// FUNGSI BARU: UMUMKAN JADWAL
// ============================================================
async function umumkanJadwal() {
  const btn = document.getElementById('btnNotifManual');
  const confirmMsg = "Kirim notifikasi email rangkuman jadwal bimbingan yang tersedia ke seluruh mahasiswa bimbingan Anda?";
  
  if (!confirm(confirmMsg)) return;

  btn.disabled = true;
  const originalText = btn.innerHTML;
  btn.innerHTML = "⏳ Mengirim Notifikasi...";

  const res = await req('kirim_notif_manual');

  if (res.success) {
    alert("✅ Berhasil!\n" + res.message);
  } else {
    alert("⚠️ Gagal\n" + res.message);
  }

  btn.disabled = false;
  btn.innerHTML = originalText;
}

// ============================================================
// RENDER DOSEN DASHBOARD
// ============================================================
function renderDosenDashboard() {
  const app = document.getElementById('app');
  
  // Bagian Header & Tombol Pengumuman
  let html = `
    <div class="container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
        <div>
          <h1 style="font-size:1.8rem">Halo, ${user.nama}</h1>
          <p style="color:var(--slate)">Kelola jadwal bimbingan Anda di sini.</p>
        </div>
        <button class="btn-outline" onclick="logout()">Keluar</button>
      </div>

      <div style="text-align: right;">
        <button id="btnNotifManual" class="btn-announce" onclick="umumkanJadwal()">
          <span>📢</span> Umumkan Jadwal ke Mahasiswa
        </button>
      </div>

      <div class="grid">
        <div class="card">
          <h3 style="margin-bottom:15px">Buat Sesi Baru</h3>
          <div style="display:flex;flex-direction:column;gap:10px">
            <input type="date" id="tglSlot" class="btn-outline" style="width:100%">
            <div style="display:flex;gap:10px">
              <input type="time" id="jamMulai" class="btn-outline" style="flex:1" value="09:00">
              <input type="time" id="jamSelesai" class="btn-outline" style="flex:1" value="10:00">
            </div>
            <select id="tipeSlot" class="btn-outline" style="width:100%">
              <option value="Offline">Offline (Kampus)</option>
              <option value="Online">Online (Zoom/Meet)</option>
              <option value="Revisi">Khusus Revisi</option>
            </select>
            <button class="btn-primary" onclick="handleCreateSlot()">+ Tambah Sesi</button>
          </div>
        </div>

        <div class="card">
          <h3 style="margin-bottom:15px">Status Mahasiswa</h3>
          <p style="color:var(--slate);font-size:0.9rem">Klik tombol "Umumkan" setelah Bapak/Ibu selesai mengatur semua jadwal agar mahasiswa mendapatkan satu email rangkuman.</p>
        </div>
      </div>

      <h2 style="margin:30px 0 20px">Daftar Sesi Bimbingan</h2>
      <div id="listSesiDosen">
        </div>
    </div>
  `;
  
  app.innerHTML = html;
  // Panggil fungsi render list sesi (loadSesiDosen) di sini...
}

// (Sisa fungsi lainnya: login, logout, loadData, render list, tetap sama)
// Pastikan fungsi init() memanggil renderDosenDashboard() jika role === 'dosen'

function logout() {
  localStorage.removeItem('lytana_token');
  location.reload();
}

// Inisialisasi awal
async function init() {
  const token = localStorage.getItem('lytana_token');
  if (!token) {
    // Tampilkan form login jika tidak ada token
    renderLogin(); 
    return;
  }
  
  // Cek validasi token ke server
  const res = await req('login_check'); 
  if (res.success) {
    user = res.user;
    if (user.role === 'dosen') renderDosenDashboard();
    else renderMahasiswaDashboard();
  } else {
    renderLogin();
  }
}

// Jalankan sistem
init();

</script>
</body>
</html>
