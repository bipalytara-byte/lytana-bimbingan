<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lytana — Linkage of Your Technical Appointment & Network Assistance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1c2e;--navy2:#162336;--navy3:#1e3050;
  --blue:#2563eb;--blue2:#3b82f6;--sky:#38bdf8;
  --teal:#0d9488;--teal2:#14b8a6;--green:#10b981;
  --amber:#f59e0b;--rose:#f43f5e;--purple:#8b5cf6;--orange:#f97316;
  --slate:#94a3b8;--slate2:#cbd5e1;--white:#ffffff;
  --card:rgba(255,255,255,0.04);--card2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --radius:14px;--radius2:10px;--shadow:0 4px 24px rgba(0,0,0,0.35);
  --font:'Plus Jakarta Sans',sans-serif;--font2:'Sora',sans-serif;
}
body{font-family:var(--font);background:var(--navy);color:var(--text);min-height:100vh;line-height:1.6;overflow-x:hidden}
#app{position:relative;z-index:1}
h1,h2,h3{font-family:var(--font2);font-weight:700}
.page{display:none;min-height:100vh}.page.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.form-label{font-size:0.82rem;font-weight:600;color:var(--text2);text-transform:uppercase}
.form-input,.form-select,.form-textarea{background:rgba(255,255,255,0.06);border:1px solid var(--border2);border-radius:var(--radius2);padding:11px 14px;color:var(--text);width:100%}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:var(--radius2);font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--blue);color:white}
.btn-orange{background:var(--orange);color:white}
.btn-ghost{background:var(--card2);color:var(--text2);border:1px solid var(--border2)}
.btn-teal{background:var(--teal);color:white}
.btn-full{width:100%}.btn-sm{padding:6px 12px;font-size:0.8rem}
.topbar{position:sticky;top:0;z-index:100;background:rgba(15,28,46,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 20px}
.topbar-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.nav-tabs{display:flex;gap:4px;background:var(--card);border-radius:10px;padding:4px}
.nav-tab{padding:6px 14px;border-radius:7px;cursor:pointer;font-size:0.82rem;color:var(--text2);border:none;background:none}
.nav-tab.active{background:var(--blue);color:white}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--card2);border-radius:40px;padding:5px 12px}
.avatar-ph{border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;color:white}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{width:100%;max-width:440px}
.main-content{padding:28px 20px;max-width:1100px;margin:0 auto}
#toast-container{position:fixed;top:80px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--navy2);border-radius:var(--radius2);padding:12px 16px;font-size:0.88rem;color:var(--text);border-left:4px solid var(--blue2)}
.photo-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border2)}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
<div id="toast-container"></div>

<!-- PAGE LOGIN -->
<div id="page-login" class="page active">
  <div class="login-page"><div class="login-box">
    <div style="text-align:center;margin-bottom:30px">
      <h1 style="color:var(--sky)">Lytana</h1>
      <p style="font-size:0.8rem">Linkage of Your Technical Appointment & Network Assistance</p>
    </div>
    <div class="card">
      <div class="form-group">
        <label class="form-label">Kode Login</label>
        <input id="login-kode" class="form-input" type="text" placeholder="Masukkan kode unik/NIM"/>
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()"><span id="login-btn-text">Masuk</span></button>
    </div>
  </div></div>
</div>

<!-- PAGE DOSEN -->
<div id="page-dosen" class="page">
  <div class="topbar"><div class="topbar-inner">
    <div style="font-weight:700;color:var(--sky)">Lytana</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="dSwitch('dashboard')">Dashboard</button>
      <button class="nav-tab" onclick="dSwitch('profil')">Profil</button>
    </div>
    <div class="user-chip">
      <div id="d-avatar-wrap"></div>
      <span id="d-nama-chip">—</span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Keluar</button>
    </div>
  </div></div>
  <div class="main-content">
    <div id="d-dashboard" class="page-section active">
      <h2>Selamat Datang, Dosen!</h2>
    </div>
    <div id="d-profil" class="page-section">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div class="card">
          <h3>Informasi Akun</h3>
          <div class="form-group">
            <label class="form-label">Kode Dosen (Login)</label>
            <input id="d-profil-kode" class="form-input"/>
          </div>
          <button class="btn btn-primary btn-sm" onclick="updateKodeDosen(this)">Simpan Kode Baru</button>
          <div class="form-group"><label class="form-label">Nama</label><input id="d-profil-nama" class="form-input" readonly/></div>
        </div>
        <div class="card" style="text-align:center">
          <h3>Foto Profil</h3>
          <div id="d-profil-foto-wrap" style="margin:20px 0"></div>
          <input type="file" id="d-foto-input" accept="image/jpeg, image/png" style="display:none" onchange="previewDosenFoto(event)"/>
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('d-foto-input').click()">Pilih Foto</button>
          <div id="d-foto-preview-wrap" style="display:none;flex-direction:column;align-items:center;margin-top:10px">
            <img id="d-foto-preview" class="photo-preview"/>
            <button class="btn btn-teal btn-sm" onclick="uploadDosenFoto()" style="margin-top:10px">Upload Foto</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw6pBW3mvuDY045_aq86yuSoXaSZuW33DnZQAPnkpvSC6-G4U724Ys8RQiizNz4rwZVLg/exec';
let state = { user:null, token:null };

// HELPERS
function toast(msg, type='info') {
  const el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

function renderAvatar(foto, nama, size=30) {
  const fallback = `<div class="avatar-ph" style="width:${size}px;height:${size}px;border-radius:50%">${nama[0]}</div>`;
  if (!foto) return fallback;
  const safeFallback = fallback.replace(/"/g, "&quot;");
  return `<img src="${foto}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover" onerror="this.outerHTML='${safeFallback}'"/>`;
}

function compressImage(file, maxSize, callback) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > h) { if(w > maxSize){ h*=maxSize/w; w=maxSize; } }
      else { if(h > maxSize){ w*=maxSize/h; h=maxSize; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// API
async function api(action, params={}, method='POST') {
  const options = { method: 'POST', body: JSON.stringify({ action, token: state.token, ...params }) };
  const res = await fetch(GAS_URL, options);
  return await res.json();
}

// LOGIC
async function doLogin() {
  const kode = document.getElementById('login-kode').value.trim();
  if(!kode) return toast('Masukkan kode');
  const btn = document.getElementById('login-btn-text'); btn.innerHTML='<div class="spinner"></div>';
  const res = await api('login', {kode});
  btn.textContent='Masuk';
  if(!res.success) return toast(res.message);
  state.token = res.token; state.user = res.user;
  localStorage.setItem('lytana_token', res.token);
  localStorage.setItem('lytana_user', JSON.stringify(res.user));
  if(res.user.role === 'dosen') { showPage('dosen'); fillDosenProfil(); updateDosenChip(); }
  else { toast('Halaman mahasiswa belum dimuat di contoh ini'); }
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

function dSwitch(s) {
  document.querySelectorAll('#page-dosen .page-section').forEach(x=>x.classList.remove('active'));
  document.getElementById('d-'+s).classList.add('active');
  if(s==='profil') fillDosenProfil();
}

function updateDosenChip() {
  document.getElementById('d-nama-chip').textContent = state.user.nama;
  document.getElementById('d-avatar-wrap').innerHTML = renderAvatar(state.user.foto, state.user.nama);
}

function fillDosenProfil() {
  document.getElementById('d-profil-kode').value = state.user.kode;
  document.getElementById('d-profil-nama').value = state.user.nama;
  document.getElementById('d-profil-foto-wrap').innerHTML = renderAvatar(state.user.foto, state.user.nama, 80);
}

let compressedFoto = null;
function previewDosenFoto(e) {
  const file = e.target.files[0];
  compressImage(file, 400, (url) => {
    compressedFoto = url;
    document.getElementById('d-foto-preview').src = url;
    document.getElementById('d-foto-preview-wrap').style.display='flex';
  });
}

async function uploadDosenFoto() {
  const res = await api('uploadPhotoDosen', { base64: compressedFoto.split(',')[1] });
  if(res.success) { 
    state.user.foto = res.url; 
    localStorage.setItem('lytana_user', JSON.stringify(state.user));
    updateDosenChip(); fillDosenProfil();
    document.getElementById('d-foto-preview-wrap').style.display='none';
    toast('Foto diperbarui');
  }
}

async function updateKodeDosen(btn) {
  const newKode = document.getElementById('d-profil-kode').value.trim();
  const res = await api('updateDosenProfile', {newKode});
  if(res.success) { toast('Kode diubah, silakan login ulang'); setTimeout(()=>doLogout(), 2000); }
  else { toast(res.message); }
}

function doLogout() {
  localStorage.clear(); location.reload();
}

// Auto Login
(function(){
  const t=localStorage.getItem('lytana_token'), u=localStorage.getItem('lytana_user');
  if(t && u) { state.token=t; state.user=JSON.parse(u); 
    if(state.user.role==='dosen') { showPage('dosen'); updateDosenChip(); }
  }
})();
</script>
</body>
</html>
